apiVersion: v2
name: my-umbrella-chart
description: An umbrella Helm chart bundling hello-world, nginx, and nats
type: application
version: 0.1.0
appVersion: "1.0.0"

dependencies:
  - name: hello-world
    version: "0.1.0"
    repository: "https://helm.github.io/examples"
    condition: hello-world.enabled

  - name: nginx
    version: "18.3.6"
    repository: "https://charts.bitnami.com/bitnami"
    condition: nginx.enabled

  - name: nats
    version: "1.2.6"
    repository: "https://nats-io.github.io/k8s/helm/charts/"
    condition: nats.enabled